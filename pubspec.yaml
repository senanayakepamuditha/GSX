name: gsx
description: A mobile app for AgroSpectra multispectral scanning system.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase for Authentication
  supabase_flutter: ^2.0.0
  
  # UI/Icons
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.10+1
  
  # Utilities
  shared_preferences: ^2.5.5
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
